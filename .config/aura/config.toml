[general]
cpus = 12
editor = "vi"
doas = false
language = "en-US"
noconfirm = false

[aur]
# Paths omitted on purpose so aura uses its per-user XDG defaults
# (~/.cache/aura/...), which work for any user. Do NOT hardcode /root or a
# specific home here — the dotfiles are shared between the live and real users.
chroot = []
ignores = []
git = false
hotedit = false
shellcheck = false
diff = false
delmakedeps = false
clean = false
warn_unknowns = true
nocheck = false
skipdepcheck = false
reverse = false

[backups]
automatic = true

