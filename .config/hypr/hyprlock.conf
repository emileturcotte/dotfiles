# Hyprlock — Nord theme — Émile Turcotte
# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = false
}

background {
    monitor =
    color = rgba(46, 52, 64, 1.0)   # nord0
    blur_passes = 2
    blur_size = 6
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(216, 222, 233, 1.0)   # nord4
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A %d %B')"
    color = rgba(136, 192, 208, 1.0)   # nord8
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(136, 192, 208, 1.0)   # nord8
    inner_color = rgba(59, 66, 82, 1.0)      # nord1
    font_color = rgba(236, 239, 244, 1.0)    # nord6
    fade_on_empty = false
    placeholder_text = <i>Password</i>
    check_color = rgba(163, 190, 140, 1.0)   # nord14 (green)
    fail_color = rgba(191, 97, 106, 1.0)     # nord11 (red)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    position = 0, -50
    halign = center
    valign = center
}
